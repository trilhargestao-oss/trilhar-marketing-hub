<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>software-de-marketing-trilhar</title>
    <script>
      console.log('HTML Script: Iniciado');
      window.onerror = function(msg, url, lineNo, columnNo, error) {
        var message = [
          'Message: ' + msg,
          'URL: ' + url,
          'Line: ' + lineNo,
          'Column: ' + columnNo,
          'Error object: ' + JSON.stringify(error)
        ].join(' - ');
        console.error('ERRO GLOBAL:', message);
        alert('ERRO NO NAVEGADOR: ' + msg); // Alert apenas para debug visual imediato
        return false;
      };
      document.addEventListener('DOMContentLoaded', () => {
        console.log('HTML Script: DOM Pronto');
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
